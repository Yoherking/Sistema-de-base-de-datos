<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - Tienda de Repuestos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <h2 class="mb-2">REPUESTOS SUR</h2>
      <p class="text-muted mb-4">Acceso al panel administrativo</p>
      <div id="loginAlert" class="alert alert-danger login-alert" role="alert"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input type="text" class="form-control" id="username" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
      </form>
    </div>
  </div>

  <script>
    const apiBase = 'http://localhost:8083/api/usuarios';
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('loginAlert');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      alertBox.classList.remove('show');
      alertBox.textContent = '';

      try {
        const response = await fetch(`${apiBase}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();

        if (!response.ok || !result.success) {
          alertBox.textContent = result.message || 'Credenciales inválidas';
          alertBox.classList.add('show');
          return;
        }

        localStorage.setItem('tiendaAuth', JSON.stringify({ username, rol: result.rol || 'admin' }));
        window.location.href = 'index.html';
      } catch (error) {
        alertBox.textContent = 'No se pudo conectar con el servidor.';
        alertBox.classList.add('show');
      }
    });
  </script>
</body>
</html>
